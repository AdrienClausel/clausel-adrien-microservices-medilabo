server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient-service
              uri: http://patient-service:8080
              predicates:
                - Path=/patients/**

            - id: patient-notes-service
              uri: http://patient-notes-service:8080
              - predicates:
                  - Path=/patient-notes/**