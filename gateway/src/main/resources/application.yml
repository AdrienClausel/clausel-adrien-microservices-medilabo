server:
  port: 8080

spring:
  application:
    name: gateway

  autoconfigure:
    exclude:
      - org.springframework.cloud.gateway.config.GatewayNoLoadBalancerClientAutoConfiguration

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: patient
              uri: http://localhost:8081
              predicates:
                - Path=/patients/**