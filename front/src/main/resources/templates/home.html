<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">



    <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 70vh;
        text-align: center;
    ">
        <img th:src="@{/logo.jpg}"
             alt="Medilabo"
             style="
                width: 100%;
                max-width: 700px;
                height: auto;
                margin-bottom: 30px;
                "
        />

        <p style="
            color: #7f8c8d;
            font-size: 1rem;
            font-family: Arial, sans-serif;
            letter-spacing: 2px;
        ">
            Suivi médical des patients
        </p>

        <a th:href="@{/patients}" style="
            margin-top: 40px;
            padding: 12px 30px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-family: Arial, sans-serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
        ">
            Accéder aux patients
        </a>
    </div>

</th:block>
</body>
</html>
