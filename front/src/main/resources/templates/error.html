<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<th:block th:fragment="content">

    <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 60vh;
        text-align: center;
    ">
        <h3 th:text="${(message ?: 'Une erreur est survenue') + '(' + status + ')'}" style="color: #2c3e50; margin-bottom: 30px;"></h3>
        <a th:href="@{/}" class="btn btn-primary">Retour</a>
    </div>

</th:block>
</body>
</html>
