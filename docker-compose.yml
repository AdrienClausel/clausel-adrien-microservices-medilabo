version: '3.8'

services:

  patient-db:
    image: mysql:8
    container_name: patient-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PATIENT_DB_NAME}
      MYSQL_USER: ${PATIENT_DB_USER}
      MYSQL_PASSWORD: ${PATIENT_DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./docker/patient-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 20

  patient-service:
    build: ./patient-service
    container_name: patient-service
    ports:
      - "8082:8080"
    environment:
      PATIENT_DB_NAME: ${PATIENT_DB_NAME}
      PATIENT_DB_USER: ${PATIENT_DB_USER}
      PATIENT_DB_PASSWORD: ${PATIENT_DB_PASSWORD}
    depends_on:
      patient-db:
        condition: service_healthy

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8080:8080"
    depends_on:
      - patient-service

  front:
    build: ./front
    container_name: front
    ports:
      - "8081:8080"
    depends_on:
      - gateway